{% extends "base.html" %}

{% block title %}Page Not Found - Face Recognition Attendance{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="text-center">
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle" style="font-size: 5rem; color: #f59e0b;"></i>
        </div>
        
        <h1 class="display-1 fw-bold mb-3">404</h1>
        <h3 class="fw-bold mb-3 text-secondary">Page Not Found</h3>
        <p class="text-muted mb-4 fs-5">
            The page you are looking for doesn't exist or has been moved.
        </p>
        
        <a href="/" class="btn btn-primary me-2">
            <i class="bi bi-house me-2"></i>
            Go to Dashboard
        </a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-2"></i>
            Go Back
        </a>
    </div>
</div>
{% endblock %}
