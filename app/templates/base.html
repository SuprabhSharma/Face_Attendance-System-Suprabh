<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Face Recognition Attendance System{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">
    <div class="app-shell d-flex" style="min-height: 100vh;">
        <!-- Sidebar Navigation -->
        {% include 'sidebar.html' %}

        <div id="sidebarBackdrop" class="sidebar-backdrop d-lg-none"></div>
        
        <!-- Main Content Area -->
        <div class="main-shell flex-grow-1 d-flex flex-column">
            <!-- Top Navbar -->
            {% include 'navbar.html' %}
            
            <!-- Page Content -->
            <main class="flex-grow-1 overflow-auto">
                <div class="container-fluid py-4">
                    {% block content %}{% endblock %}
                </div>
            </main>
            
            <!-- Footer -->
            <footer class="bg-white border-top border-light py-3 mt-auto">
                <div class="container-fluid text-center text-muted small">
                    <p class="mb-0">&copy; 2024 Face Recognition Attendance System. All rights reserved.</p>
                </div>
            </footer>
        </div>
    </div>

    <!-- Toast Container for Notifications -->
    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('appSidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const toggleBtn = document.getElementById('sidebarToggle');

            if (!sidebar || !backdrop || !toggleBtn) {
                return;
            }

            function closeSidebar() {
                sidebar.classList.remove('show');
                backdrop.classList.remove('show');
                document.body.classList.remove('sidebar-open');
            }

            function openSidebar() {
                sidebar.classList.add('show');
                backdrop.classList.add('show');
                document.body.classList.add('sidebar-open');
            }

            toggleBtn.addEventListener('click', () => {
                if (sidebar.classList.contains('show')) {
                    closeSidebar();
                } else {
                    openSidebar();
                }
            });

            backdrop.addEventListener('click', closeSidebar);

            sidebar.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    if (window.innerWidth < 992) {
                        closeSidebar();
                    }
                });
            });

            window.addEventListener('resize', () => {
                if (window.innerWidth >= 992) {
                    closeSidebar();
                }
            });
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
