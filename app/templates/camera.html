{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Face Scanner</h2>
    <p style="color: var(--text-muted); margin-bottom: 1rem; font-size: 0.9rem;">Please look directly at the camera to mark your attendance.</p>
    
    <div class="video-container">
        <video id="videoElement" autoplay playsinline></video>
        <canvas id="canvasElement" style="display: none;"></canvas>
    </div>

    <button id="scanBtn" class="btn">Scan Face</button>
    <div id="statusMessage" class="status"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        startCamera('videoElement');
    });

    document.getElementById('scanBtn').addEventListener('click', async () => {
        const base64Img = captureBase64('videoElement', 'canvasElement');
        const btn = document.getElementById('scanBtn');
        btn.disabled = true;
        btn.textContent = 'Scanning...';
        hideStatus();

        try {
            const res = await fetch('/api/recognize-face', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: base64Img })
            });
            const data = await res.json();
            
            if (data.success) {
                if (data.found) {
                     showStatus('success', data.message);
                } else {
                     showStatus('error', data.message);
                }
            } else {
                showStatus('error', data.message || 'Error occurred.');
            }
        } catch (err) {
            showStatus('error', 'An error occurred connecting to the server.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Scan Face';
        }
    });
</script>
{% endblock %}
