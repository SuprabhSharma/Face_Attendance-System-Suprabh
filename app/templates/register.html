{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Register User</h2>
    
    <div class="form-group">
        <label for="userName">Full Name</label>
        <input type="text" id="userName" placeholder="Enter Full Name" autocomplete="off">
    </div>

    <div class="video-container">
        <video id="videoElement" autoplay playsinline></video>
        <canvas id="canvasElement" style="display: none;"></canvas>
    </div>

    <button id="captureBtn" class="btn">Capture & Register</button>
    <div id="statusMessage" class="status"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        startCamera('videoElement');
    });

    document.getElementById('captureBtn').addEventListener('click', async () => {
        const nameInput = document.getElementById('userName');
        const name = nameInput.value.trim();
        
        if (!name) {
            showStatus('error', 'Please enter a name first.');
            return;
        }

        const base64Img = captureBase64('videoElement', 'canvasElement');
        const btn = document.getElementById('captureBtn');
        btn.disabled = true;
        btn.textContent = 'Registering...';
        hideStatus();

        try {
            const res = await fetch('/api/register-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, image: base64Img })
            });
            const data = await res.json();
            
            if (data.success) {
                showStatus('success', data.message);
                nameInput.value = '';
            } else {
                showStatus('error', data.message);
            }
        } catch (err) {
            showStatus('error', 'An error occurred connecting to the server.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Capture & Register';
        }
    });
</script>
{% endblock %}
