{% extends "base.html" %}

{% block content %}
<div class="table-wrapper">
    <h2 style="text-align: center; margin-bottom: 2rem;">Attendance Records</h2>
    <div style="margin-bottom: 1rem; text-align: right;">
        <button id="refreshBtn" class="btn btn-secondary" style="width: auto;">Refresh</button>
    </div>
    
    <div id="recordsContainer">
        <p style="text-align: center; color: var(--text-muted);">Loading...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function loadAttendance() {
        const container = document.getElementById('recordsContainer');
        container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Loading...</p>';
        
        try {
            const res = await fetch('/api/attendance');
            const result = await res.json();
            
            if (result.success) {
                if (result.data.length === 0) {
                     container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">No attendance records found.</p>';
                     return;
                }
                
                // Group by date
                const grouped = result.data.reduce((acc, record) => {
                    if (!acc[record.date]) {
                        acc[record.date] = [];
                    }
                    acc[record.date].push(record);
                    return acc;
                }, {});

                container.innerHTML = '';
                
                // Sort dates descending (newest first)
                const sortedDates = Object.keys(grouped).sort((a, b) => new Date(b) - new Date(a));
                
                // Render grouped data
                sortedDates.forEach(date => {
                    const records = grouped[date];
                    
                    // Create a header for the date
                    const dateHeader = document.createElement('h3');
                    dateHeader.textContent = date;
                    dateHeader.style.marginTop = '1.5rem';
                    dateHeader.style.marginBottom = '0.75rem';
                    dateHeader.style.color = 'var(--text-main)';
                    dateHeader.style.borderBottom = '1px solid var(--border)';
                    dateHeader.style.paddingBottom = '0.5rem';
                    dateHeader.style.fontSize = '1.25rem';
                    
                    // Create table for that date
                    const table = document.createElement('table');
                    table.style.marginBottom = '2rem';
                    table.innerHTML = `
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${records.map(r => `
                                <tr>
                                    <td>${r.name}</td>
                                    <td>${r.time}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    `;
                    
                    container.appendChild(dateHeader);
                    container.appendChild(table);
                });
            } else {
                container.innerHTML = `<p style="text-align: center; color: var(--error);">Failed to load records.</p>`;
            }
        } catch (error) {
            container.innerHTML = `<p style="text-align: center; color: var(--error);">Network error.</p>`;
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadAttendance();
    });

    document.getElementById('refreshBtn').addEventListener('click', loadAttendance);
</script>
{% endblock %}
